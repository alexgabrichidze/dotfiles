# Autostart configuration

# Bar and wallpaper
exec-once = waybar
exec-once = hyprpaper

# Notifications
exec-once = mako

# Clipboard history watcher
exec-once = wl-paste --watch cliphist store

# Portals for screen sharing and compatibility
exec-once = xdg-desktop-portal-hyprland

# GTK theme switcher
exec-once = nwg-look

# Lockscreen and idlescreen
exec-once = hyprlock
exec-once = hypridle

# Polkit
exec-once = hyprpolkitagent
